# 通用反爬供应商特征库，不按域名区分（域名级偏好见 crawl_domain_rules 表）。
# 发现新的验证码/挑战供应商时只改这个文件，不改 detector.py 代码。

keywords:
  - "请完成安全验证"
  - "验证您是真人"
  - "访问受限"
  - "unusual traffic"
  - "verify you are human"
  - "access denied"
  - "checking your browser"

selectors:
  - "#cf-challenge-stage"
  - "div.g-recaptcha"
  - "iframe[src*='hcaptcha']"
  - "iframe[src*='recaptcha']"

login_path_patterns:
  - "/login"
  - "/signin"
  - "/sign-in"
  - "/account/login"

captcha_domains:
  - "challenges.cloudflare.com"
  - "captcha-delivery.com"

# 站点适配器：站点专属的交互式挑战特征，只在最终 host 命中 domains 时生效，
# 不污染通用 detector（HC-005）。新增站点只在此加一条，不改 detector.py。
site_adapters:
  - domains: ["taobao.com", "tmall.com"]
    provider: "taobao-slider"
    keywords: ["请拖动下方滑块", "向右滑动验证", "滑动验证"]
    selectors: ["#nc_1_wrapper", ".nc-container", ".nc_iconfont.btn_slide"]
  - domains: ["smzdm.com"]
    provider: "smzdm-verify"
    keywords: ["完成下方验证后继续访问"]
    selectors: ["#geetest_captcha"]
