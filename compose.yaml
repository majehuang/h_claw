services:
  crawler-mcp:
    build: .
    container_name: crawler-mcp
    restart: unless-stopped
    shm_size: 2gb

    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000

      DATA_DIR: /data
      MAX_CONCURRENCY: 5
      MAX_BROWSER_PAGES: 3
      MAX_PER_DOMAIN: 1

      HTTP_TIMEOUT_SECONDS: 15
      BROWSER_TIMEOUT_SECONDS: 60
      STEALTH_TIMEOUT_SECONDS: 90

      CACHE_TTL_SECONDS: 900
      RESULT_TTL_SECONDS: 86400
      MAX_INLINE_MARKDOWN_BYTES: 51200
      MAX_MARKDOWN_BYTES: 2097152
      MAX_HTML_BYTES: 10485760

      DATABASE_URL: ${CRAWLER_DATABASE_URL}
      PROFILE_ENCRYPTION_KEY: ${PROFILE_ENCRYPTION_KEY}   # 从部署环境注入，勿写死

    volumes:
      - crawler-data:/data

    # 容器隔离（第 14.2 节）：只读根文件系统 + 仅 /data 卷可写，
    # 浏览器临时文件写入 tmpfs（/tmp 与 /dev/shm），已实测不影响 Chromium。
    read_only: true
    tmpfs:
      # HOME=/home/crawler 只读会导致 Chromium crashpad_handler 因无法写入默认
      # crash 数据库目录而崩溃（"chrome_crashpad_handler: --database is required"），
      # 必须以 tmpfs 挂载并显式指定运行用户 uid/gid（容器内 crawler=1000:1000）。
      - /tmp:rw,size=1g,uid=1000,gid=1000          # 登录明文工作区 + 浏览器临时文件，按并发上调
      - /home/crawler:rw,size=64m,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # 资源限制（第 8 节：2 核 / 4GB / 2GB 共享内存）。
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

    ports:
      - "${MCP_BIND_ADDR:-127.0.0.1}:8000:8000"

    networks:
      - hermes-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  crawler-data:

networks:
  hermes-net:
    external: true
